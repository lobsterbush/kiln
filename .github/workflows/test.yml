name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------------------------------
  # Suite 1 + 2: Static analysis (TypeScript + ESLint)
  # -----------------------------------------------------------------------
  static:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: TypeScript type check
        run: npm run typecheck
      - name: ESLint
        run: npm run lint

  # -----------------------------------------------------------------------
  # Suite 3: Vitest unit + component tests
  # -----------------------------------------------------------------------
  vitest:
    name: Vitest (unit + component)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run Vitest
        run: npm test
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-coverage
          path: coverage/

  # -----------------------------------------------------------------------
  # Suite 4: Deno edge function tests
  # -----------------------------------------------------------------------
  deno:
    name: Deno edge function tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run Deno tests
        run: |
          deno test \
            supabase/functions/_shared/anthropic.test.ts \
            supabase/functions/demo-turn/index.test.ts \
            supabase/functions/generate-followup/index.test.ts \
            supabase/functions/generate-feedback/index.test.ts \
            --allow-net --allow-env --no-check

  # -----------------------------------------------------------------------
  # Suite 5: Playwright E2E tests (demo + PWA + join)
  # -----------------------------------------------------------------------
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Build production bundle
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        env:
          CI: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  # -----------------------------------------------------------------------
  # Production build verification
  # -----------------------------------------------------------------------
  build:
    name: Production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
